<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | متجر إلكتروني</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Moyasar -->
    <script src="https://cdn.moyasar.com/mpf/0.3.0/moyasar.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Password Modal Styles */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .password-modal.show {
            display: flex;
            opacity: 1;
        }
        
        .password-box {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .password-modal.show .password-box {
            transform: scale(1);
        }
        
        .password-box h3 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.3rem;
        }
        
        .password-box input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }
        
        .password-box input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .password-box .error-shake {
            animation: shake 0.5s;
            border-color: #ff4444 !important;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .password-hint {
            color: #666;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        
        /* Floating Add Button */
        .fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
            transition: all 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }
        
        .fab:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div id="toast" class="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="password-modal">
        <div class="password-box">
            <h3>🔒 أدخل كلمة السر</h3>
            <input type="password" id="passwordInput" placeholder="••••••••" maxlength="8">
            <button class="btn btn-primary btn-block" onclick="checkPassword()">
                فتح واجهة النشر
            </button>
            <p class="password-hint">اضغط ESC للإغلاق</p>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">🛍️ متجري</div>
        
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
            </div>
            
            <div class="user-info">
                <span id="userName"></span>
                <button class="btn btn-danger" onclick="Auth.logout()">خروج</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">
            <span class="glitch" data-text="منتجاتنا">منتجاتنا</span>
        </h1>

        <div id="productsContainer" class="products-grid">
            <!-- Skeleton loading -->
        </div>
    </main>

    <!-- Floating Add Button -->
    <button class="fab" onclick="openPasswordModal()" title="إضافة منتج">
        +
    </button>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">إتمام الشراء</h2>
                <button class="close-btn" onclick="closePaymentModal()">&times;</button>
            </div>
            <div id="productDetails"></div>
            <div class="mysr-form"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    
    <script>
        const CORRECT_PASSWORD = '11223311';
        
        // Update user name
        firebaseApp.auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').textContent = user.displayName || '';
            }
        });

        // Load products
        async function init() {
            Products.showSkeleton('productsContainer', 3);
            await Products.load();
            Products.render('productsContainer');
        }

        init();

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value;
            const filtered = Products.search(term);
            Products.render('productsContainer', filtered);
        });

        // Password Modal Functions
        function openPasswordModal() {
            document.getElementById('passwordModal').classList.add('show');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
        }
        
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const enteredPassword = input.value;
            
            if (enteredPassword === CORRECT_PASSWORD) {
                closePasswordModal();
                window.location.href = 'admin.html';
            } else {
                input.classList.add('error-shake');
                Animations.showToast('كلمة السر غير صحيحة!', 'error');
                
                setTimeout(() => {
                    input.classList.remove('error-shake');
                    input.value = '';
                    input.focus();
                }, 500);
            }
        }
        
        // Enter key in password field
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        
        // ESC to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePasswordModal();
                closePaymentModal();
            }
        });
        
        // Close on backdrop click
        document.getElementById('passwordModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('passwordModal')) {
                closePasswordModal();
            }
        });

        // Close payment modal
        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('show');
            document.querySelector('.mysr-form').innerHTML = '';
        }
    </script>
</body>
  </html>
